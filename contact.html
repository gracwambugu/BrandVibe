<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact BrandVibe</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f1eb;
      color: #1f1f1f;
    }

    .page-wrapper {
      padding: 50px 20px;
    }

    .container {
      max-width: 760px;
      margin: auto;
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .eyebrow {
      background: #e8f5ef;
      color: #2fa67a;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 18px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    .intro {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      font-size: 14px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #2fa67a;
      outline: none;
      box-shadow: 0 0 0 3px rgba(47, 166, 122, 0.12);
    }

    .submit-btn {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      background: #2fa67a;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #268a65;
    }

    .note {
      margin-top: 15px;
      font-size: 13px;
      text-align: center;
      color: #777;
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 28px 20px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

<div class="page-wrapper">
  <div class="container">

    <div class="eyebrow">Contact BrandVibe</div>

    <h1>Let's Grow Your Business</h1>

    <p class="intro">
      Tell us about your business and the support you need. Whether it's marketing, a virtual assistant, admin support, or a tailored team, we'll review your inquiry and get in touch.
    </p>

    <form action="https://formcarry.com/s/ZhfP8MPhn0e" method="POST">

      <div class="form-grid">

        <div>
          <label>Full Name</label>
          <input type="text" name="Full Name" required>
        </div>

        <div>
          <label>Email Address</label>
          <input type="email" name="Email" required>
        </div>

        <div>
          <label>Phone Number</label>
          <input type="text" name="Phone">
        </div>

        <div>
          <label>Business / Company Name</label>
          <input type="text" name="Business Name">
        </div>

        <div>
          <label>What type of support are you looking for?</label>
          <select name="Support Needed" required>
            <option value="">Select an option</option>
            <option>Marketing Support</option>
            <option>Virtual Assistant</option>
            <option>Executive Assistant</option>
            <option>Social Media Management</option>
            <option>Digital Marketing</option>
            <option>Customer Support</option>
            <option>Accounting Support</option>
            <option>Administrative Support</option>
            <option>Multiple Roles</option>
            <option>Not Sure Yet</option>
            <option>Other</option>
          </select>
        </div>

        <div>
          <label>When would you like to get started?</label>
          <select name="Timeline">
            <option value="">Select timeline</option>
            <option>Immediately</option>
            <option>Within 1 month</option>
            <option>1–3 months</option>
            <option>Just exploring</option>
          </select>
        </div>

        <div class="full-width">
          <label>Tell us what you need help with</label>
          <textarea name="Client Needs" required placeholder="Describe your goals and what support you need"></textarea>
        </div>

      </div>

      <button type="submit" class="submit-btn">Send Inquiry</button>

      <div class="note">
        We'll review your request and get back to you within 24 hours.
      </div>

    </form>

  </div>
</div>

</body>
</html>
